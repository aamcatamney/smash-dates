name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/screenshots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # The landing page references screenshots/*.png; bundle the repo's screenshots into it.
      - name: Bundle screenshots
        run: |
          mkdir -p site/screenshots
          cp docs/screenshots/*.png site/screenshots/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v5
