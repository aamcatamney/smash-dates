name: Release

# One release per merge to main: compute a CalVer version (vYYYY.M.MICRO,
# MICRO resets each month), build & push the container image, then create the
# git tag and a GitHub Release with auto-generated notes. Skip the whole thing
# by putting [skip release] in the merge commit message.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # push the tag + create the release
  packages: write       # push the image to GHCR
  id-token: write
  attestations: write

concurrency:
  group: release        # serialize so the MICRO counter never races
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.calc.outputs.skip }}
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      major_minor: ${{ steps.calc.outputs.major_minor }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # need full history + tags to count releases

      - name: Compute CalVer
        id: calc
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet

          msg="$(git log -1 --pretty=%B)"
          if printf '%s' "$msg" | grep -qF '[skip release]'; then
            echo "Merge commit asked to skip the release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          year="$(date -u +%Y)"
          month="$(date -u +%-m)"            # no leading zero -> valid semver
          prefix="v${year}.${month}."

          max=-1
          for t in $(git tag -l "${prefix}*"); do
            micro="${t#"$prefix"}"
            case "$micro" in
              ''|*[!0-9]*) continue ;;       # ignore anything non-numeric
            esac
            if [ "$micro" -gt "$max" ]; then max="$micro"; fi
          done
          micro=$((max + 1))

          version="${year}.${month}.${micro}"
          echo "skip=false"                       >> "$GITHUB_OUTPUT"
          echo "version=${version}"               >> "$GITHUB_OUTPUT"
          echo "tag=v${version}"                  >> "$GITHUB_OUTPUT"
          echo "major_minor=${year}.${month}"     >> "$GITHUB_OUTPUT"
          echo "Next release: v${version}"

  release:
    name: Build, tag & release
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Create & push tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
