version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /ClientApp
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns: ['@angular/*', '@angular-devkit/*']
      other:
        patterns: ['*']
        exclude-patterns: ['@angular/*', '@angular-devkit/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
