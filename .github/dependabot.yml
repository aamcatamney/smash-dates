version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /ClientApp
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Angular major upgrades must be done deliberately (ng update), in lockstep with
    # @ngrx/signals + angular-eslint which lag the newest Angular major. So only propose
    # minor/patch npm updates here; majors are an opt-in, hand-driven migration.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      angular:
        patterns: ['@angular/*', '@angular-devkit/*']
      other:
        patterns: ['*']
        exclude-patterns: ['@angular/*', '@angular-devkit/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
