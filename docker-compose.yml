services:
  postgres:
    image: postgres:17-alpine
    container_name: smash-dates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smash_dates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smash_dates"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
